name: 每日直播间监控

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间 10:00（UTC+8，所以 UTC 02:00）
  workflow_dispatch:       # 支持手动触发
    inputs:
      duration:
        description: '录制时长（秒），默认60用于测试，正式用900'
        required: false
        default: '60'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            pulseaudio \
            x11-utils \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium --with-deps

      - name: 启动虚拟显示和音频
        run: |
          # 启动虚拟显示器（必须在 Playwright 启动前）
          Xvfb :99 -screen 0 1280x720x24 -ac &
          XVFB_PID=$!
          echo "XVFB_PID=$XVFB_PID" >> $GITHUB_ENV
          echo "DISPLAY=:99" >> $GITHUB_ENV
          # 等待 Xvfb 就绪
          sleep 3
          # 验证 Xvfb 是否正常
          DISPLAY=:99 xdpyinfo | head -5 || echo "Xvfb 启动失败"
          # 启动虚拟音频
          pulseaudio --start --exit-idle-time=-1 || true
          sleep 1
          pactl load-module module-virtual-sink sink_name=VirtualSink || true
          pactl set-default-sink VirtualSink || true
          echo "虚拟显示和音频已启动"

      - name: 运行监控任务
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DISPLAY: ':99'
          RECORD_DURATION: ${{ github.event.inputs.duration || '60' }}
        run: python scheduler.py --now --duration $RECORD_DURATION

      - name: 提交话术文档到仓库
        run: |
          git config user.name "live-monitor-bot"
          git config user.email "bot@live-monitor"
          git add storage/archive/
          git diff --staged --quiet || git commit -m "📝 $(date '+%Y-%m-%d') 话术归档"
          git push
