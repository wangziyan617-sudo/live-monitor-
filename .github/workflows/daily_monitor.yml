name: 每日直播间监控

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间 10:00（UTC+8，所以 UTC 02:00）
  workflow_dispatch:       # 支持手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            pulseaudio \
            x11-utils \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium

      - name: 启动虚拟显示和音频
        run: |
          # 启动虚拟显示器
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          # 启动虚拟音频
          pulseaudio --start --exit-idle-time=-1
          pactl load-module module-virtual-sink sink_name=VirtualSink
          pactl set-default-sink VirtualSink
          sleep 2

      - name: 运行监控任务
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DISPLAY: ':99'
        run: python scheduler.py --now

      - name: 提交话术文档到仓库
        run: |
          git config user.name "live-monitor-bot"
          git config user.email "bot@live-monitor"
          git add storage/archive/
          git diff --staged --quiet || git commit -m "📝 $(date '+%Y-%m-%d') 话术归档"
          git push
