name: 每日直播间监控

on:
  schedule:
    - cron: '0 12 * * *'  # 北京时间 20:00（UTC+8，所以 UTC 12:00）
  workflow_dispatch:       # 支持手动触发
    inputs:
      duration:
        description: '录制时长（秒），默认900秒（15分钟）'
        required: false
        default: '900'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 GitHub Pages（从 docs/ 目录发布）
        run: |
          # 通过 GitHub API 将 Pages source 设置为 main 分支的 /docs 目录
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"legacy","source":{"branch":"main","path":"/docs"}}'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            xvfb \
            pulseaudio \
            pulseaudio-utils \
            x11-utils \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2t64 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libpango-1.0-0 \
            libcairo2 \
            libpulse0 \
            libasound2-plugins

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium

      - name: 启动虚拟显示和音频
        run: |
          # 启动虚拟显示器
          Xvfb :99 -screen 0 1280x720x24 -ac &
          XVFB_PID=$!
          echo "XVFB_PID=$XVFB_PID" >> $GITHUB_ENV
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3
          DISPLAY=:99 xdpyinfo | head -5 || echo "Xvfb 启动失败"
          # 启动虚拟音频
          pulseaudio --start --exit-idle-time=-1 || true
          sleep 1
          pactl load-module module-virtual-sink sink_name=VirtualSink || true
          pactl set-default-sink VirtualSink || true
          # 配置 ALSA 默认走 PulseAudio（让 Chromium 的 ALSA 调用路由到 VirtualSink）
          cat > ~/.asoundrc << 'EOF'
          pcm.!default {
            type pulse
            fallback "sysdefault"
            hint {
              show on
              description "Default ALSA Output (currently PulseAudio Sound Server)"
            }
          }
          ctl.!default {
            type pulse
            fallback "sysdefault"
          }
          EOF
          echo "虚拟显示和音频已启动，VirtualSink = $(pactl get-default-sink)"

      - name: 写入抖音 Cookie
        env:
          DOUYIN_COOKIES: ${{ secrets.DOUYIN_COOKIES }}
        run: |
          echo "$DOUYIN_COOKIES" > config/douyin_cookies.json
          echo "Cookie 已写入 ($(wc -c < config/douyin_cookies.json) bytes)"

      - name: 运行监控任务
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
          DISPLAY: ':99'
          PULSE_SINK: VirtualSink
          # libasound2-plugins 提供 ALSA->PulseAudio 桥接，让 Chromium 音频走 VirtualSink
          ALSA_PCM_CARD: pulse
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/alsa-lib/libasound_module_pcm_pulse.so
          RECORD_DURATION: ${{ github.event.inputs.duration || '900' }}
        run: python scheduler.py --now --duration $RECORD_DURATION

      - name: 生成静态数据文件
        run: python generate_static.py

      - name: 注入 Dashboard Token 到看板
        run: |
          sed -i 's|<script>|const GITHUB_TOKEN = "${{ secrets.DASHBOARD_TOKEN }}";\n  <script>|' docs/index.html
          echo "✅ Token 已注入，竞品管理页可写权限"

      - name: 提交话术文档、数据库和静态页面到仓库
        run: |
          git config user.name "live-monitor-bot"
          git config user.email "bot@live-monitor"
          mkdir -p storage/archive
          # 提交话术归档、数据库
          git add storage/archive/ storage/data.db || true
          # 提交静态页面（docs/index.html + docs/data/*.json）
          git add docs/ || true
          git diff --staged --quiet || git commit -m "📝 $(date '+%Y-%m-%d') 话术归档 + 静态页面"
          git push || echo "没有新内容需要推送"
