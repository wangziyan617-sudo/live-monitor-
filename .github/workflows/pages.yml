name: GitHub Pages 部署

on:
  push:
    branches: [main]
    paths:
      # 看板HTML或数据变更时，直接 deploy（不再重新生成，避免覆盖 CI 刚写入的新数据）
      - 'docs/**'
      - 'storage/data.db'
      - 'storage/archive/**'
  workflow_dispatch:    # 手动触发
  # 接受 main workflow 触发（见 daily_monitor.yml 末尾）
  workflow_run:
    workflows: [每日直播间监控]
    types: [completed]
    branches: [main]

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 注入 GitHub Token 到 index.html
        run: |
          python3 -c "
          import os
          html = open('docs/index.html', encoding='utf-8').read()
          token = os.environ.get('GITHUB_TOKEN', '')
          if token:
              html = html.replace('<!-- GITHUB_TOKEN_PLACEHOLDER -->', 'const GITHUB_TOKEN = \"' + token + '\";')
              print('Token injected (len=%d)' % len(token))
          else:
              html = html.replace('<!-- GITHUB_TOKEN_PLACEHOLDER -->', '// GITHUB_TOKEN not available')
              print('No token available')
          open('docs/index.html', 'w', encoding='utf-8').write(html)
          "
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
